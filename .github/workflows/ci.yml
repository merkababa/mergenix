name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check Source/ pages/ tests/ app.py

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run test suite with coverage
        run: pytest tests/ -v --tb=short --cov=Source --cov-report=term-missing --cov-report=xml --cov-fail-under=70

      - name: Coverage summary
        if: always()
        run: |
          echo "## Coverage Report (Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage.xml ]; then
            python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          rate = float(root.attrib.get('line-rate', 0)) * 100
          lines_valid = root.attrib.get('lines-valid', '?')
          lines_covered = root.attrib.get('lines-covered', '?')
          print(f'Total coverage: {rate:.1f}%')
          print(f'Lines covered: {lines_covered} / {lines_valid}')
          "
          else
            echo "No coverage.xml found"
          fi

      - name: Test results summary
        if: always()
        run: |
          echo "## Test Results (Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
          echo "See pytest output above for detailed results."
