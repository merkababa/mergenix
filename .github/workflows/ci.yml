name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Test - Carrier Analysis
        run: pytest tests/test_carrier_analysis.py -v --tb=short

      - name: Test - Trait Prediction
        run: pytest tests/test_trait_prediction.py -v --tb=short

      - name: Test - Carrier Panel
        run: pytest tests/test_carrier_panel.py -v --tb=short

      - name: Test - OAuth
        run: pytest tests/test_oauth.py -v --tb=short

      - name: Test - Database
        run: pytest tests/test_database.py -v --tb=short

      - name: Test - Audit
        run: pytest tests/test_audit.py -v --tb=short

      - name: Test - Rate Limiter
        run: pytest tests/test_rate_limiter.py -v --tb=short

      - name: Test - Tier Validation
        run: pytest tests/test_tier_validation.py -v --tb=short

      - name: Test - Email Verification
        run: pytest tests/test_email_verification.py -v --tb=short

      - name: Test - TOTP
        run: pytest tests/test_totp.py -v --tb=short

      - name: Test - Parser Streaming
        run: pytest tests/test_parser_streaming.py -v --tb=short

      - name: Run Full Test Suite
        run: pytest tests/ -v --tb=short

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check Source/ pages/ tests/ app.py
