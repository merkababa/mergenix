name: ClinVar Sync Check

on:
  schedule:
    - cron: '0 6 1 * *'  # 1st of every month at 6 AM UTC
  workflow_dispatch:  # Manual trigger

jobs:
  clinvar-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check panel freshness
        run: python scripts/clinvar_sync.py check

      - name: Sync with ClinVar
        run: python scripts/clinvar_sync.py sync --output-dir=clinvar-reports

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: clinvar-sync-report
          path: clinvar-reports/
