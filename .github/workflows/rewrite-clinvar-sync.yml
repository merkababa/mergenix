name: ClinVar Freshness Check (Rewrite)

on:
  schedule:
    - cron: '0 6 1 * *' # 1st of every month at 6 AM UTC
  workflow_dispatch:
    inputs:
      force-update:
        description: 'Force update even if data is current'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.12'
  CLINVAR_URL: 'https://ftp.ncbi.nlm.nih.gov/pub/clinvar/tab_delimited/variant_summary.txt.gz'

permissions: read-all

jobs:
  check-freshness:
    name: Check ClinVar Data Freshness
    runs-on: ubuntu-latest
    outputs:
      needs-update: ${{ steps.check.outputs.needs-update }}
      clinvar-date: ${{ steps.check.outputs.clinvar-date }}
      local-date: ${{ steps.check.outputs.local-date }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install httpx

      - name: Check ClinVar freshness
        id: check
        run: |
          python - <<'PYEOF'
          import httpx
          import json
          import os
          from pathlib import Path

          # Check remote ClinVar last-modified date
          resp = httpx.head("${{ env.CLINVAR_URL }}", follow_redirects=True)
          remote_date = resp.headers.get("last-modified", "unknown")
          print(f"Remote ClinVar date: {remote_date}")

          # Check local data freshness marker
          marker_path = Path("packages/genetics-data/clinvar_last_sync.json")
          local_date = "never"
          if marker_path.exists():
              with open(marker_path) as f:
                  data = json.load(f)
                  local_date = data.get("last_sync", "never")

          print(f"Local data date: {local_date}")

          force = "${{ inputs.force-update }}" == "true"
          needs_update = force or (local_date == "never") or (remote_date != local_date)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"needs-update={'true' if needs_update else 'false'}\n")
              f.write(f"clinvar-date={remote_date}\n")
              f.write(f"local-date={local_date}\n")

          if needs_update:
              print("ClinVar data needs updating")
          else:
              print("ClinVar data is up to date")
          PYEOF

      - name: Freshness summary
        run: |
          echo "## ClinVar Freshness Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Remote Date | ${{ steps.check.outputs.clinvar-date }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Local Date | ${{ steps.check.outputs.local-date }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Needs Update | ${{ steps.check.outputs.needs-update }} |" >> $GITHUB_STEP_SUMMARY

  create-update-pr:
    name: Create Update PR
    runs-on: ubuntu-latest
    needs: check-freshness
    if: needs.check-freshness.outputs.needs-update == 'true'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install httpx pandas
          if [ -f apps/api/requirements.txt ]; then
            pip install -r apps/api/requirements.txt
          fi

      - name: Download and process ClinVar data
        run: |
          python - <<'PYEOF'
          import httpx
          import gzip
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          print("Downloading ClinVar variant summary...")

          output_dir = Path("clinvar-reports")
          output_dir.mkdir(exist_ok=True)

          # Stream download to temp file instead of loading all into memory
          raw_path = output_dir / "variant_summary.txt.gz"
          file_size_bytes = 0
          remote_last_modified = "unknown"
          with httpx.stream("GET", "${{ env.CLINVAR_URL }}", follow_redirects=True, timeout=300) as resp:
              resp.raise_for_status()
              # Capture headers while inside the context manager (they are only
              # guaranteed to be available during the stream lifetime)
              remote_last_modified = resp.headers.get("last-modified", "unknown")
              with open(raw_path, "wb") as f:
                  for chunk in resp.iter_bytes(chunk_size=8192):
                      f.write(chunk)
                      file_size_bytes += len(chunk)

          # Stream line count without full decompression in memory
          record_count = 0
          with gzip.open(raw_path, "rt", encoding="utf-8", errors="replace") as f:
              for line in f:
                  record_count += 1
          # Subtract header line
          record_count -= 1
          print(f"Downloaded {record_count + 1} variant records (including header)")

          # Save freshness report
          report = {
              "download_date": datetime.now(timezone.utc).isoformat(),
              "remote_last_modified": remote_last_modified,
              "total_records": record_count,
              "file_size_bytes": file_size_bytes,
          }
          with open(output_dir / "sync_report.json", "w") as f:
              json.dump(report, f, indent=2)

          # Update local freshness marker
          marker_path = Path("packages/genetics-data/clinvar_last_sync.json")
          marker_path.parent.mkdir(exist_ok=True)
          with open(marker_path, "w") as f:
              json.dump({
                  "last_sync": remote_last_modified,
                  "sync_date": datetime.now(timezone.utc).isoformat(),
                  "record_count": record_count,
              }, f, indent=2)

          print("ClinVar sync complete")
          print(json.dumps(report, indent=2))
          PYEOF

      - name: Upload sync report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: clinvar-sync-report
          path: clinvar-reports/
          retention-days: 30

      - name: Create branch and PR
        run: |
          BRANCH="chore/clinvar-sync-$(date +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add packages/genetics-data/clinvar_last_sync.json
          git commit -m "chore: update ClinVar data freshness marker

          Remote date: ${{ needs.check-freshness.outputs.clinvar-date }}
          Previous local date: ${{ needs.check-freshness.outputs.local-date }}"

          git push origin "$BRANCH"

          gh pr create \
            --title "chore: ClinVar data sync (${{ needs.check-freshness.outputs.clinvar-date }})" \
            --body "## ClinVar Data Freshness Update

          | Property | Value |
          |----------|-------|
          | Remote Date | ${{ needs.check-freshness.outputs.clinvar-date }} |
          | Previous Local Date | ${{ needs.check-freshness.outputs.local-date }} |
          | Triggered By | ${{ github.event_name }} |

          This PR updates the ClinVar data freshness marker. Review the sync report artifact for details.

          > Auto-generated by ClinVar Freshness Check workflow" \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
